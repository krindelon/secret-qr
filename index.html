<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    Encrypt / Decrypt — Security Key
    WebAuthn PRF-based AES-GCM encryption, runs fully client-side.
    ============================================================
  -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:,">

  <title>Encrypt / Decrypt — Security Key</title>
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- ============================================================
    Styles
    Organised sections:
      1. Design tokens (CSS custom properties)
      2. Reset & base
      3. Layout
      4. Typography helpers
      5. Components: card, tabs, form controls, buttons
      6. Components: output panel, QR box
      7. Components: toast, modal, spinner
      8. Utility classes
      9. Responsive overrides
  ============================================================ -->
  <style>

    /* ── 1. Design tokens ───────────────────────────────────────────────────── */
    :root {
      --bg:          #ffffff;
      --fg:          #1f2328;
      --muted:       #656d76;
      --border:      #d0d7de;
      --panel:       #f6f8fa;
      --input-bg:    #ffffff;
      --accent:      #0969da;
      --accent-hover:#0757b8;
      --success:     #1a7f37;
      --danger:      #cf222e;
      --focus:       #0969da33;
      --shadow:      0 1px 0 rgba(31,35,40,0.04), 0 1px 3px rgba(31,35,40,0.08);
      --radius:      8px;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell,
              "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas,
              "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0d1117;
        --fg:          #e6edf3;
        --muted:       #8b949e;
        --border:      #30363d;
        --panel:       #161b22;
        --input-bg:    #0d1117;
        --accent:      #2f81f7;
        --accent-hover:#1f6feb;
        --success:     #3fb950;
        --danger:      #f85149;
        --focus:       #2f81f733;
        --shadow:      0 0 0 1px #30363d;
      }
    }

    /* ── 2. Reset & base ─────────────────────────────────────────────────────── */
    *             { box-sizing: border-box; }
    html, body    { height: 100%; }
    body {
      margin: 0;
      background:            var(--bg);
      color:                 var(--fg);
      font-family:           var(--sans);
      line-height:           1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 3. Layout ───────────────────────────────────────────────────────────── */
    .wrap   { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }
    header  { margin-bottom: 20px; }
    .grid   { display: grid; grid-template-columns: 1fr; gap: 16px; }
    /* ── 4. Typography helpers ───────────────────────────────────────────────── */
    .title {
      display:     flex;
      align-items: center;
      gap:         12px;
      flex-wrap:   wrap;
    }
    .title h1 {
      font-size:      22px;
      margin:         0;
      font-weight:    600;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin: 6px 0 0;
      color:  var(--muted);
      font-size: 14px;
    }
    label {
      display:     block;
      font-size:   13px;
      font-weight: 600;
      margin:      14px 0 6px;
    }
    .char-counter {
      font-size:  11px;
      color:      var(--muted);
      text-align: right;
      margin-top: 3px;
    }
    .len-info    { font-size: 12px; color: var(--muted); }
    .countdown   { font-size: 12px; color: var(--muted); }
    .qr-label    { font-size: 12px; font-weight: 600; color: var(--muted); }
    .qr-hint     { font-size: 12px; color: var(--muted); text-align: center; }
    footer {
      margin-top:  28px;
      text-align:  center;
      color:       var(--muted);
      font-size:   12px;
    }

    /* ── 5a. Badge ───────────────────────────────────────────────────────────── */
    .badge {
      display:     inline-flex;
      align-items: center;
      gap:         6px;
      font-size:   12px;
      padding:     4px 8px;
      border:      1px solid var(--border);
      border-radius: 999px;
      background:  var(--panel);
      color:       var(--muted);
    }

    /* ── 5b. Card & tabs ─────────────────────────────────────────────────────── */
    .card {
      background:    var(--bg);
      border:        1px solid var(--border);
      border-radius: var(--radius);
      box-shadow:    var(--shadow);
    }
    nav.tabs {
      display:       flex;
      border-bottom: 1px solid var(--border);
    }
    nav.tabs button {
      flex:          1;
      appearance:    none;
      border:        0;
      background:    transparent;
      color:         var(--muted);
      padding:       12px 2px;
      font-weight:   600;
      cursor:        pointer;
      font-size:     13px;
      letter-spacing:.02em;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition:    color .15s, border-color .15s;
      text-align:    center;
    }
    nav.tabs button:hover  { color: var(--fg); }
    nav.tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
    .panel { padding: 18px; margin-top: 12px; }

    /* ── 5c. Form controls ───────────────────────────────────────────────────── */
    textarea,
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width:        100%;
      font-family:  var(--mono);
      font-size:    14px;
      padding:      10px 12px;
      background:   var(--input-bg);
      color:        var(--fg);
      border:       1px solid var(--border);
      border-radius:var(--radius);
      outline:      none;
      transition:   border .15s, box-shadow .15s;
    }
    textarea            { resize: vertical; min-height: 140px; }
    textarea[readonly]  { background: var(--panel); }
    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow:   0 0 0 3px var(--focus);
    }

    /* QR error-correction select shares token styling */
    .qr-level-select {
      font-size:     12px;
      padding:       2px 6px;
      border:        1px solid var(--border);
      border-radius: 4px;
      background:    var(--panel);
      color:         var(--fg);
      cursor:        pointer;
    }

    /* ── 5d. Buttons ─────────────────────────────────────────────────────────── */
    button.primary {
      background:    var(--accent);
      color:         white;
      border:        1px solid var(--accent);
      padding:       9px 14px;
      border-radius: var(--radius);
      font-weight:   600;
      font-size:     14px;
      cursor:        pointer;
      transition:    background .15s;
    }
    button.primary:hover    { background: var(--accent-hover); }
    button.primary:disabled { opacity: .6; cursor: not-allowed; }

    button.ghost {
      background:    var(--panel);
      color:         var(--fg);
      border:        1px solid var(--border);
      padding:       8px 12px;
      border-radius: var(--radius);
      font-size:     13px;
      cursor:        pointer;
    }
    button.ghost:hover { background: var(--bg); }

    /* Icon-only ghost variant (copy / download) */
    button.ghost.icon { padding: 6px; }

    /* Scan / Upload ghost variant */
    button.ghost.inline {
      padding:     6px 10px;
      font-size:   12px;
      display:     flex;
      align-items: center;
      gap:         5px;
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

    /* ── 5e. Error message ───────────────────────────────────────────────────── */
    .error {
      margin-top:    10px;
      padding:       10px 12px;
      border-radius: var(--radius);
      background:    color-mix(in oklab, var(--danger) 10%, transparent);
      border:        1px solid color-mix(in oklab, var(--danger) 30%, var(--border));
      color:         var(--danger);
      font-size:     13px;
    }
/* ── 6. Output panel & QR box ────────────────────────────────────────────── */
    .output {
      margin-top:  18px;
      padding-top: 16px;
      border-top:  1px solid var(--border);
    }
    .output-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      margin-bottom:   6px;
    }
    .output-header label   { margin: 0; }
    .output-header-actions { display: flex; gap: 8px; align-items: center; }

    /* Decrypt input header reuses output-header layout */
    .decrypt-input-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      margin-bottom:   6px;
    }
    .decrypt-input-header label   { margin: 0; }
    .decrypt-input-actions        { display: flex; gap: 6px; }

    .qr-box {
      background:     var(--panel);
      border:         1px solid var(--border);
      border-radius:  var(--radius);
      padding:        12px;
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            10px;
    }
    .qr-box-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      width:           100%;
      max-width:       280px;
      margin-bottom:   6px;
    }
    #qr-wrap {
      background:    white;
      padding:       8px;
      border-radius: 6px;
    }
    .qr-level-row {
      display:     flex;
      align-items: center;
      gap:         6px;
      font-size:   12px;
      color:       var(--muted);
      margin-top:  8px;
    }
    .qr-level-row label { margin: 0; font-weight: 500; }

    /* ── 7. Toast, modal & spinner ───────────────────────────────────────────── */
    .toast {
      position:       fixed;
      left:           50%;
      bottom:         20px;
      transform:      translateX(-50%) translateY(20px);
      background:     var(--fg);
      color:          var(--bg);
      padding:        8px 12px;
      border-radius:  6px;
      font-size:      13px;
      opacity:        0;
      pointer-events: none;
      transition:     .2s;
      z-index:        50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-backdrop {
      position:    fixed;
      inset:       0;
      background:  rgba(0,0,0,.6);
      display:     grid;
      place-items: center;
      z-index:     40;
    }
    .modal {
      background:    var(--bg);
      border:        1px solid var(--border);
      border-radius: 12px;
      padding:       12px;
      width:         min(92vw, 420px);
      box-shadow:    0 20px 40px rgba(0,0,0,.3);
    }
    .modal video {
      width:         100%;
      aspect-ratio:  1;
      background:    black;
      border-radius: 8px;
    }
    .modal-bar {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      margin-top:      8px;
    }
    .modal-bar span { font-size: 13px; color: var(--muted); }

    .spinner {
      display:          inline-block;
      width:            14px;
      height:           14px;
      border:           2px solid currentColor;
      border-right-color: transparent;
      border-radius:    50%;
      animation:        spin .7s linear infinite;
      vertical-align:   -2px;
      margin-right:     6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 8. Utility ──────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── 9. Responsive ───────────────────────────────────────────────────────── */
    @media (min-width: 760px) {
      .grid { grid-template-columns: 1.3fr .7fr; }
    }

  </style>
</head>

<body>
<div class="wrap">

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header>
    <div class="title">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0a4 4 0 0 0-4 4v2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0
                 2-2V8a2 2 0 0 0-2-2h-1V4a4 4 0 0 0-4-4ZM5 4a3 3 0 1 1 6 0v2H5V4Zm-2
                 4h10v6H3V8Z"/>
      </svg>
      <h1>Encrypt / Decrypt</h1>
      <span class="badge" title="Uses WebAuthn PRF">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1.5A6.5 6.5 0 1 0 14.5 8 6.508 6.508 0 0 0 8
                   1.5ZM7 11.5 3.5 8l1.06-1.06L7 9.38l4.44-4.44L12.5 6Z"/>
        </svg>
        Security key
      </span>
    </div>
    <p class="subtitle">One physical key — runs locally</p>
  </header>

  <!-- ── Main card ──────────────────────────────────────────────────────────── -->
  <div class="card">

    <!-- Tab nav -->
    <nav class="tabs" role="tablist">
      <button id="tab-enc" class="active" aria-selected="true"  role="tab">Encrypt</button>
      <button id="tab-dec"               aria-selected="false" role="tab">Decrypt</button>
    </nav>

    <!-- ── Encrypt panel ────────────────────────────────────────────────────── -->
    <section id="pane-encrypt" class="panel" role="tabpanel">

      <label for="plain">Secret</label>
      <textarea
        id="plain"
        placeholder="Enter text to encrypt…"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <div id="char-counter" class="char-counter">0 chars</div>

      <div class="actions">
        <button id="btn-enc" class="primary">Encrypt with security key</button>
      </div>
      <div id="enc-err" class="error hidden"></div>

      <!-- Encrypt output (hidden until first encryption) -->
      <div id="enc-out" class="output hidden">
        <div class="grid">

          <!-- Left: ciphertext textarea -->
          <div>
            <div class="output-header">
              <label for="cipher">Encrypted payload</label>
              <div class="output-header-actions">
                <span id="len-info" class="len-info"></span>
                <button id="copy-enc" class="ghost icon" title="Copy" aria-label="Copy">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M5 3.5A1.5 1.5 0 0 1 6.5 2h5A1.5 1.5 0 0 1 13 3.5v7A1.5
                             1.5 0 0 1 11.5 12h-5A1.5 1.5 0 0 1 5 10.5v-7ZM6.5 3a.5.5
                             0 0 0-.5.5v7a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-7a.5.5
                             0 0 0-.5-.5h-5Z"/>
                    <path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H5v1H4.5a.5.5 0 0 0-.5.5v7a.5.5
                             0 0 0 .5.5H9v1H4.5A1.5 1.5 0 0 1 3 12.5v-7Z"/>
                  </svg>
                </button>
              </div>
            </div>
            <textarea id="cipher" readonly rows="6"></textarea>
          </div>

          <!-- Right: QR code -->
          <div class="qr-box">
            <div class="qr-box-header">
              <span class="qr-label">QR Code</span>
              <button id="dl-qr" class="ghost icon" title="Download PNG" aria-label="Download QR">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                  <path d="M8 1a.5.5 0 0 1 .5.5v6.793l2.146-2.147a.5.5 0 0 1 .708.708l-3
                           3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 8.293V1.5A.5.5
                           0 0 1 8 1z"/>
                  <path d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5z"/>
                </svg>
              </button>
            </div>
            <div id="qr-wrap" aria-label="QR code"></div>
            <div id="qr-hint" class="qr-hint">Scan to transfer</div>
            <div class="qr-level-row">
              <label for="qr-level">Error correction:</label>
              <select id="qr-level" class="qr-level-select">
                <option value="L">L – 7%</option>
                <option value="M" selected>M – 15%</option>
                <option value="Q">Q – 25%</option>
                <option value="H">H – 30%</option>
              </select>
            </div>
          </div>

        </div><!-- /.grid -->
      </div><!-- /#enc-out -->

    </section><!-- /#pane-encrypt -->

    <!-- ── Decrypt panel ────────────────────────────────────────────────────── -->
    <section id="pane-decrypt" class="panel hidden" role="tabpanel">

      <div class="decrypt-input-header">
        <label for="cipher-in">Encrypted payload</label>
        <div class="decrypt-input-actions">
          <button id="btn-scan" class="ghost inline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7V5c0-1.1.9-2 2-2h2"/>
              <path d="M17 3h2c1.1 0 2 .9 2 2v2"/>
              <path d="M21 17v2c0 1.1-.9 2-2 2h-2"/>
              <path d="M7 21H5c-1.1 0-2-.9-2-2v-2"/>
              <rect x="8" y="8" width="8" height="8" rx="1"/>
            </svg>
            Scan
          </button>
          <button id="btn-upload" class="ghost inline">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload
          </button>
          <!-- Hidden file input triggered by #btn-upload -->
          <input id="file-qr" type="file" accept="image/*" class="hidden">
        </div>
      </div>

      <textarea
        id="cipher-in"
        placeholder="Paste payload or scan QR"
        rows="5"
      ></textarea>

      <div class="actions">
        <button id="btn-dec" class="primary">Decrypt with security key</button>
      </div>
      <div id="dec-err" class="error hidden"></div>

      <!-- Decrypt output (hidden until first decryption) -->
      <div id="dec-out" class="output hidden">
        <div class="output-header">
          <label for="plain-out">Decrypted text</label>
          <div class="output-header-actions">
            <span id="countdown" class="countdown"></span>
            <button id="copy-dec" class="ghost icon" title="Copy" aria-label="Copy">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M5 3.5A1.5 1.5 0 0 1 6.5 2h5A1.5 1.5 0 0 1 13 3.5v7A1.5
                         1.5 0 0 1 11.5 12h-5A1.5 1.5 0 0 1 5 10.5v-7ZM6.5 3a.5.5
                         0 0 0-.5.5v7a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-7a.5.5
                         0 0 0-.5-.5h-5Z"/>
                <path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H5v1H4.5a.5.5 0 0 0-.5.5v7a.5.5
                         0 0 0 .5.5H9v1H4.5A1.5 1.5 0 0 1 3 12.5v-7Z"/>
              </svg>
            </button>
          </div>
        </div>
        <textarea id="plain-out" readonly rows="5"></textarea>
      </div><!-- /#dec-out -->

    </section><!-- /#pane-decrypt -->

  </div><!-- /.card -->

</div><!-- /.wrap -->

<!-- ── Toast notification ──────────────────────────────────────────────────── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ── Camera / QR scan modal ─────────────────────────────────────────────── -->
<div id="cam-modal" class="modal-backdrop hidden" aria-hidden="true">
  <div class="modal">
    <video id="cam-video" playsinline muted></video>
    <canvas id="cam-canvas" class="hidden"></canvas>
    <div class="modal-bar">
      <span>Point camera at QR</span>
      <button id="cam-close" class="ghost">Close</button>
    </div>
  </div>
</div>



<!-- QR libraries via CDN (cached offline by service worker) -->
<script defer src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js" crossorigin="anonymous"></script>

<!-- ============================================================
  Application Script
  Organised sections:
    1. DOM references
    2. Constants
    3. Tab navigation
    4. UI helpers (toast, error, button state)
    5. Crypto utilities (base64url encode/decode)
    6. WebAuthn helpers (credential creation, PRF key derivation)
    7. QR code rendering
    8. Encrypt flow
    9. Decrypt flow
   10. QR scan / upload
   11. Camera modal
============================================================ -->
<script>
(() => {
  'use strict';

  // ── 1. DOM references ─────────────────────────────────────────────────────

  const $   = s => document.querySelector(s);

  // Tabs
  const tabEnc  = $('#tab-enc');
  const tabDec  = $('#tab-dec');
  const paneEnc = $('#pane-encrypt');
  const paneDec = $('#pane-decrypt');

  // Encrypt panel
  const plain       = $('#plain');
  const charCounter = $('#char-counter');
  const btnEnc      = $('#btn-enc');
  const encErr      = $('#enc-err');
  const encOut      = $('#enc-out');
  const cipher      = $('#cipher');
  const copyEnc     = $('#copy-enc');
  const lenInfo     = $('#len-info');
  const qrHint      = $('#qr-hint');
  const qrWrap      = $('#qr-wrap');
  const dlQr        = $('#dl-qr');

  // Decrypt panel
  const cipherIn  = $('#cipher-in');
  const btnDec    = $('#btn-dec');
  const decErr    = $('#dec-err');
  const decOut    = $('#dec-out');
  const plainOut  = $('#plain-out');
  const copyDec   = $('#copy-dec');
  const countdown = $('#countdown');
  const btnUpload = $('#btn-upload');
  const fileQr    = $('#file-qr');
  const btnScan   = $('#btn-scan');

  // Toast & camera modal
  const toast     = $('#toast');
  const camModal  = $('#cam-modal');
  const camVideo  = $('#cam-video');
  const camCanvas = $('#cam-canvas');
  const camClose  = $('#cam-close');

  // ── 2. Constants ──────────────────────────────────────────────────────────

  const QR_MAX_BYTES    = 2953;   // max bytes encodable in a QR code (binary, version 40-H)
  const AUTO_CLEAR_SECS = 60;    // seconds before decrypted text is auto-wiped
  const TOAST_MS        = 1600;  // toast display duration in ms

  // Generate and persist a random user ID — WebAuthn requires user.id to be
  // a unique, opaque byte sequence, not a hardcoded value.
  function getOrCreateUserId() {
    const KEY = 'webauthn_user_id';
    try {
      const stored = localStorage.getItem(KEY);
      if (stored) return Uint8Array.from(JSON.parse(stored));
    } catch { /* localStorage unavailable; fall through to generate */ }
    const id = crypto.getRandomValues(new Uint8Array(16));
    try { localStorage.setItem(KEY, JSON.stringify(Array.from(id))); } catch {}
    return id;
  }

  // WebAuthn credential creation options (single source of truth)
  const WEBAUTHN_CREATE_OPTIONS = {
    rp:      { name: 'Local Vault' },
    user:    { id: getOrCreateUserId(), name: 'owner', displayName: 'Security Key' },
    pubKeyCredParams: [
      { type: 'public-key', alg: -7   },   // ES256
      { type: 'public-key', alg: -257 }    // RS256
    ],
    authenticatorSelection: {
      residentKey:             'required',
      requireResidentKey:      true,
      userVerification:        'required',
      authenticatorAttachment: 'cross-platform'
    },
    extensions: { prf: { enabled: true } }
  };

  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const rand = n => crypto.getRandomValues(new Uint8Array(n));

  // ── 3. Tab navigation ─────────────────────────────────────────────────────

  function setTab(which) {
    const isEnc = which === 'encrypt';
    tabEnc.classList.toggle('active', isEnc);
    tabDec.classList.toggle('active', !isEnc);
    paneEnc.classList.toggle('hidden', !isEnc);
    paneDec.classList.toggle('hidden', isEnc);
    tabEnc.setAttribute('aria-selected', isEnc);
    tabDec.setAttribute('aria-selected', !isEnc);
  }

  tabEnc.addEventListener('click', () => setTab('encrypt'));
  tabDec.addEventListener('click', () => setTab('decrypt'));

  // ── 4. UI helpers ─────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), TOAST_MS);
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideErr(el) {
    el.classList.add('hidden');
  }

  function setButtonLoading(btn, label) {
    btn.disabled   = true;
    btn._prevHTML  = btn.innerHTML;
    btn.innerHTML  = `<span class="spinner"></span> ${label}`;
  }

  function resetButton(btn) {
    btn.disabled  = false;
    btn.innerHTML = btn._prevHTML;
  }

  // ── 5. Crypto utilities ───────────────────────────────────────────────────

  /** ArrayBuffer → URL-safe base64 (no padding) */
  function buf2b64u(buf) {
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  /** URL-safe base64 → ArrayBuffer */
  function b64u2buf(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    const bin = atob(s);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out.buffer;
  }

  // ── 6. WebAuthn helpers ───────────────────────────────────────────────────

  /** Create a new resident WebAuthn credential with PRF enabled. */
  async function createResidentCredential() {
    return navigator.credentials.create({
      publicKey: {
        challenge: rand(32),
        ...WEBAUTHN_CREATE_OPTIONS
      }
    });
  }

  /**
   * Derive an AES-GCM key via the WebAuthn PRF extension.
   * @param {PublicKeyCredentialDescriptor[]} allowCreds  Pass [] to let the
   *   authenticator choose (resident key), or a specific credential ID.
   * @returns {{ keyMaterial: ArrayBuffer, assertion: PublicKeyCredential }}
   */
  async function getPrfKey(allowCreds) {
    // Use a stable salt so the same key is derived on every touch.
    const salt = await crypto.subtle.digest('SHA-256', enc.encode('static-key'));

    const publicKey = {
      challenge:        rand(32),
      userVerification: 'required',
      extensions:       { prf: { eval: { first: salt } } }
    };

    if (allowCreds && allowCreds.length) {
      publicKey.allowCredentials = allowCreds;
    }

    const assertion    = await navigator.credentials.get({ publicKey });
    const ext          = assertion.getClientExtensionResults();
    const keyMaterial  = ext?.prf?.results?.first;

    if (!keyMaterial) throw new Error('PRF not supported on this key');
    return { keyMaterial, assertion };
  }

  // ── 7. QR code rendering ──────────────────────────────────────────────────

  /**
   * Render `text` as a pixel-perfect, tightly cropped QR code into #qr-wrap.
   * Uses QRious to generate at 512px then crops and scales down to 280px.
   */
  function renderQR(text) {
    qrWrap.innerHTML = '';
    const level = $('#qr-level').value || 'M';

    // Step 1: render at high resolution.
    const temp = document.createElement('canvas');
    new QRious({
      element:    temp,
      value:      text,
      size:       512,
      level,
      background: '#ffffff',
      foreground: '#000000',
      padding:    0
    });

    // Step 2: find the bounding box of the dark modules.
    const tCtx    = temp.getContext('2d');
    const imgData = tCtx.getImageData(0, 0, temp.width, temp.height);
    const d       = imgData.data;
    let minX = temp.width, minY = temp.height, maxX = 0, maxY = 0;

    for (let y = 0; y < temp.height; y++) {
      for (let x = 0; x < temp.width; x++) {
        const i = (y * temp.width + x) * 4;
        if (d[i] < 128) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    // Step 3: scale the cropped region into the display canvas with padding.
    const displaySize = 280;
    const pad         = 20;
    const qrW         = maxX - minX + 1;
    const qrH         = maxY - minY + 1;
    const scale       = Math.min((displaySize - pad * 2) / qrW, (displaySize - pad * 2) / qrH);
    const drawW       = Math.round(qrW * scale);
    const drawH       = Math.round(qrH * scale);
    const offX        = Math.round((displaySize - drawW) / 2);
    const offY        = Math.round((displaySize - drawH) / 2);

    const canvas  = document.createElement('canvas');
    canvas.width  = displaySize;
    canvas.height = displaySize;

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, displaySize, displaySize);
    ctx.drawImage(temp, minX, minY, qrW, qrH, offX, offY, drawW, drawH);

    qrWrap.appendChild(canvas);
  }

  // ── 8. Encrypt flow ───────────────────────────────────────────────────────

  plain.addEventListener('input', () => {
    charCounter.textContent = plain.value.length + ' chars';
  });

  btnEnc.addEventListener('click', async () => {
    hideErr(encErr);
    const text = plain.value;
    if (!text) return showErr(encErr, 'Enter text to encrypt');

    setButtonLoading(btnEnc, 'Touch key…');
    try {
      // Attempt to use an existing resident credential; if none exists, create one.
      let keyMaterial, assertion;
      try {
        ({ keyMaterial, assertion } = await getPrfKey([]));
      } catch {
        await createResidentCredential();
        ({ keyMaterial, assertion } = await getPrfKey([]));
      }

      // Derive AES-GCM key from PRF output and encrypt.
      const key     = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['encrypt']);
      const iv      = rand(12);
      const ct      = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
      const payload = [buf2b64u(assertion.rawId), buf2b64u(iv), buf2b64u(ct)].join('.');

      // Display output.
      cipher.value = payload;
      encOut.classList.remove('hidden');

      const len         = payload.length;
      lenInfo.textContent = len + ' chars';
      lenInfo.style.color = len > QR_MAX_BYTES ? 'var(--danger)' : 'var(--muted)';
      qrHint.textContent  = len > QR_MAX_BYTES ? 'Too long for QR' : 'Scan to transfer';

      try { renderQR(payload); } catch (e) { console.error('QR render failed:', e); }

      showToast('Encrypted');

      // Clear the plaintext input.
      plain.value             = '';
      charCounter.textContent = '0 chars';

    } catch (e) {
      console.error('Encryption error:', e);
      showErr(encErr, e.message || 'Encryption failed');
    } finally {
      resetButton(btnEnc);
    }
  });

  copyEnc.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(cipher.value);
      showToast('Copied');
    } catch {
      showToast('Copy failed');
    }
  });

  dlQr.addEventListener('click', () => {
    const canvas = qrWrap.querySelector('canvas');
    if (!canvas) return;
    const a      = document.createElement('a');
    a.href       = canvas.toDataURL('image/png');
    a.download   = 'payload-qr.png';
    a.click();
  });

  $('#qr-level').addEventListener('change', () => {
    if (cipher.value) renderQR(cipher.value);
  });

  // ── 9. Decrypt flow ───────────────────────────────────────────────────────

  let clearTimer = null;

  /** Start the auto-wipe countdown; clears decrypted output when it reaches 0. */
  function startCountdown() {
    clearInterval(clearTimer);
    let secs = AUTO_CLEAR_SECS;
    countdown.textContent = `Clears in ${secs}s`;
    clearTimer = setInterval(() => {
      secs--;
      countdown.textContent = `Clears in ${secs}s`;
      if (secs <= 0) {
        clearInterval(clearTimer);
        clearDecryptedOutput();
        showToast('Cleared');
      }
    }, 1000);
  }

  /** Wipe and hide the decrypted output panel. */
  function clearDecryptedOutput() {
    clearInterval(clearTimer);
    countdown.textContent = '';
    plainOut.value = '';
    decOut.classList.add('hidden');
  }

  btnDec.addEventListener('click', async () => {
    hideErr(decErr);
    const payload = cipherIn.value.trim();
    const parts   = payload.split('.');
    if (parts.length !== 3) return showErr(decErr, 'Invalid payload — expected 3 dot-separated parts');

    setButtonLoading(btnDec, 'Touch key…');
    try {
      const [cid, ivb, ctb] = parts;
      const credId           = b64u2buf(cid);
      const iv               = new Uint8Array(b64u2buf(ivb));
      const ct               = b64u2buf(ctb);

      const { keyMaterial } = await getPrfKey([{ type: 'public-key', id: credId }]);
      const key              = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['decrypt']);
      const pt               = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);

      plainOut.value = dec.decode(pt);
      decOut.classList.remove('hidden');
      showToast('Decrypted');
      startCountdown();

    } catch (e) {
      console.error('Decryption error:', e);
      showErr(decErr, e.message || 'Decryption failed');
    } finally {
      resetButton(btnDec);
    }
  });

  copyDec.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(plainOut.value);
      showToast('Copied');
    } catch {
      showToast('Copy failed');
    } finally {
      clearDecryptedOutput();
    }
  });

  // ── 10. QR scan / upload ──────────────────────────────────────────────────

  btnUpload.addEventListener('click', () => fileQr.click());

  fileQr.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const bmp  = await createImageBitmap(file);
      const text = await decodeQRFromBitmap(bmp);
      if (text) {
        cipherIn.value = text;
        showToast('QR loaded');
        setTab('decrypt');
      } else {
        showErr(decErr, 'No QR code found in image');
      }
    } catch {
      showErr(decErr, 'Could not read image file');
    } finally {
      fileQr.value = '';
    }
  });

  /**
   * Attempt to decode a QR code from an ImageBitmap.
   * Tries the native BarcodeDetector API first (Chrome/Edge),
   * then falls back to jsQR if available.
   *
   * To enable jsQR, load it from a CDN:
   * https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js
   */
  async function decodeQRFromBitmap(bitmap) {
    // Primary: native BarcodeDetector (Chromium-based browsers).
    if ('BarcodeDetector' in window) {
      try {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const codes    = await detector.detect(bitmap);
        if (codes.length) return codes[0].rawValue;
      } catch { /* unsupported — fall through */ }
    }

    // Fallback: jsQR library (must be loaded separately).
    if (typeof window.jsQR === 'function') {
      try {
        const canvas = document.createElement('canvas');
        canvas.width  = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(bitmap, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const res = window.jsQR(img.data, img.width, img.height);
        if (res && res.data) return res.data;
      } catch { /* ignore */ }
    }

    return null;
  }

  // ── 11. Camera modal ──────────────────────────────────────────────────────

  let scanRaf = null;
  let stream  = null;

  btnScan.addEventListener('click', async () => {
    hideErr(decErr);
    if (!navigator.mediaDevices) return showErr(decErr, 'Camera not supported in this browser');

    camModal.classList.remove('hidden');
    camModal.setAttribute('aria-hidden', 'false');

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      camVideo.srcObject = stream;
      await camVideo.play();
      scanLoop();
    } catch {
      closeCam();
      showErr(decErr, 'Camera access denied');
    }
  });

  camClose.addEventListener('click', closeCam);

  function closeCam() {
    camModal.classList.add('hidden');
    camModal.setAttribute('aria-hidden', 'true');
    if (scanRaf) { cancelAnimationFrame(scanRaf); scanRaf = null; }
    if (stream)  { stream.getTracks().forEach(t => t.stop()); stream = null; }
    camVideo.srcObject = null;
  }

  async function scanLoop() {
    // Wait until the video has enough data to read dimensions.
    if (camVideo.readyState < 2) {
      scanRaf = requestAnimationFrame(scanLoop);
      return;
    }

    const w = camVideo.videoWidth;
    const h = camVideo.videoHeight;
    if (!w || !h) {
      scanRaf = requestAnimationFrame(scanLoop);
      return;
    }

    camCanvas.width  = w;
    camCanvas.height = h;

    const ctx = camCanvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(camVideo, 0, 0, w, h);

    let found = null;

    // Try BarcodeDetector first.
    if ('BarcodeDetector' in window) {
      try {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const codes    = await detector.detect(camCanvas);
        if (codes.length) found = codes[0].rawValue;
      } catch { /* ignore */ }
    }

    // Fallback to jsQR.
    if (!found && typeof window.jsQR === 'function') {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const res = window.jsQR(img.data, w, h);
        if (res && res.data) found = res.data;
      } catch { /* ignore */ }
    }

    if (found) {
      cipherIn.value = found;
      showToast('QR scanned');
      closeCam();
      setTab('decrypt');
      return;
    }

    scanRaf = requestAnimationFrame(scanLoop);
  }

  // Close camera modal with Escape key.
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !camModal.classList.contains('hidden')) closeCam();
  });

  // Register service worker for offline PWA support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    });
  }

})();
</script>
</body>
</html>
