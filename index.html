<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Encrypt / Decrypt</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #0a0b0e;
    color: #e6e7eb;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px 80px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 28px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0; letter-spacing: .2px; }
  .top { display: flex; gap: 10px; align-items: center; }
  .input {
    background: #11131a; border: 1px solid #1f2430; color: #e6e7eb;
    border-radius: 10px; padding: 9px 12px; outline: none; min-width: 180px;
  }
  .input:focus { border-color: #5b6cff; box-shadow: 0 0 0 3px rgba(91,108,255,.15); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; }
    header { flex-wrap: wrap; }
    .top { width: 100%; }
    .input { flex: 1; }
  }
  .card {
    background: #11131a; border: 1px solid #1f2430; border-radius: 16px;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
  }
  .card h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
    color: #9aa3b2; margin: 0 0 4px; font-weight: 600;
  }
  textarea {
    width: 100%; min-height: 140px; background: #0a0b0e; border: 1px solid #1f2430;
    border-radius: 12px; padding: 12px; color: #e6e7eb; outline: none; resize: vertical; font: inherit;
  }
  textarea:focus { border-color: #5b6cff; box-shadow: 0 0 0 3px rgba(91,108,255,.12); }
  textarea.mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 12.5px; min-height: 110px;
  }
  .actions { display: flex; gap: 8px; }
  button {
    appearance: none; border: 1px solid #1f2430; background: #1a1f2b; color: #dfe3ec;
    padding: 9px 14px; border-radius: 10px; font-weight: 500; cursor: pointer; transition: .15s;
  }
  button:hover { background: #202636; border-color: #2a3242; }
  button:active { transform: translateY(1px); }
  .btn-primary { background: #5b6cff; border-color: #5b6cff; color: white; }
  .btn-primary:hover { background: #4f5de6; border-color: #4f5de6; }
  .btn-ghost { background: transparent; }
  #countdown { font-size: 12px; color: #9aa3b2; min-height: 18px; }
  .toast {
    position: fixed; right: 20px; bottom: 20px; background: #11131a; border: 1px solid #1f2430;
    color: #e6e7eb; padding: 10px 14px; border-radius: 10px; opacity: 0; transform: translateY(8px);
    pointer-events: none; transition: opacity .2s, transform .2s; box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Encrypt / Decrypt</h1>
    <div class="top">
      <input id="secretName" class="input" value="secret" autocomplete="off" spellcheck="false" aria-label="Secret name">
      <button id="clearBtn" type="button" class="btn-ghost">Clear</button>
    </div>
  </header>

  <div class="grid">
    <section class="card">
      <h2>Encrypt</h2>
      <textarea id="plainIn" placeholder="Enter text..."></textarea>
      <div class="actions">
        <button id="encryptBtn" type="button" class="btn-primary">Encrypt</button>
      </div>
      <textarea id="cipherOut" class="mono" placeholder="Output..." readonly></textarea>
      <div class="actions">
        <button id="copyBtn" type="button">Copy</button>
      </div>
    </section>

    <section class="card">
      <h2>Decrypt</h2>
      <textarea id="cipherIn" class="mono" placeholder="Paste payload..."></textarea>
      <div class="actions">
        <button id="decryptBtn" type="button" class="btn-primary">Decrypt</button>
      </div>
      <textarea id="plainOut" placeholder="Output..." readonly></textarea>
      <div id="countdown"></div>
    </section>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
const $ = id => document.getElementById(id);
const enc = new TextEncoder();
const dec = new TextDecoder();
const rand = n => { const a = new Uint8Array(n); crypto.getRandomValues(a); return a; };

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}

function buf2b64u(buf){
  const bytes = new Uint8Array(buf);
  let bin = '';
  for(let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64u2buf(s){
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length % 4) s += '=';
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out.buffer;
}

async function ensureResidentCredential(){
  try{
    const cred = await navigator.credentials.get({
      publicKey: { challenge: rand(32), rpId: location.hostname, userVerification: 'preferred' }
    });
    if(cred) return cred;
  }catch{}
  return await navigator.credentials.create({
    publicKey: {
      challenge: rand(32),
      rp: { name: 'Local Vault', id: location.hostname },
      user: { id: new Uint8Array([1,2,3,4]), name: 'owner', displayName: 'Owner' },
      pubKeyCredParams: [{type:'public-key', alg:-7}, {type:'public-key', alg:-257}],
      authenticatorSelection: { residentKey: 'required', userVerification: 'required' },
      extensions: { prf: {} }
    }
  });
}

async function getPrfKey(secretName, allowCreds){
  const salt = await crypto.subtle.digest('SHA-256', enc.encode(secretName));
  const pub = {
    challenge: rand(32),
    rpId: location.hostname,
    userVerification: 'required',
    extensions: { prf: { eval: { first: salt } } }
  };
  if(allowCreds && allowCreds.length) pub.allowCredentials = allowCreds;
  const assertion = await navigator.credentials.get({ publicKey: pub });
  const ext = assertion.getClientExtensionResults();
  const keyMaterial = ext?.prf?.results?.first;
  if(!keyMaterial) throw new Error('Security key does not support this');
  return { keyMaterial, assertion };
}

async function doEncrypt(){
  const secretName = ($('secretName').value || 'secret').trim();
  const text = $('plainIn').value;
  if(!text) return toast('Enter text');
  try{
    await ensureResidentCredential();
    const { keyMaterial, assertion } = await getPrfKey(secretName, []);
    const key = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['encrypt']);
    const iv = rand(12);
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(text));
    const payload = [
      buf2b64u(assertion.rawId),
      buf2b64u(iv),
      buf2b64u(ct),
      buf2b64u(enc.encode(secretName))
    ].join('.');
    $('cipherOut').value = payload;
    toast('Encrypted');
  }catch(e){ console.error(e); toast(e.message || 'Failed'); }
}

let timer = null;
function startCountdown(){
  const el = $('countdown');
  clearInterval(timer);
  let remain = 60;
  el.style.display = 'block';
  el.textContent = `Clears in ${remain}s`;
  timer = setInterval(()=>{
    remain--;
    el.textContent = `Clears in ${remain}s`;
    if(remain <= 0){
      clearInterval(timer);
      $('plainOut').value = '';
      el.style.display = 'none';
    }
  }, 1000);
}

async function doDecrypt(){
  const payload = $('cipherIn').value.trim();
  const parts = payload.split('.');
  if(parts.length !== 4) return toast('Invalid payload');
  try{
    const [cid, ivb, ctb, nameb] = parts;
    const credId = b64u2buf(cid);
    const iv = new Uint8Array(b64u2buf(ivb));
    const ct = b64u2buf(ctb);
    const name = dec.decode(b64u2buf(nameb));
    $('secretName').value = name;
    const { keyMaterial } = await getPrfKey(name, [{ type:'public-key', id: credId }]);
    const key = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    $('plainOut').value = dec.decode(pt);
    toast('Decrypted');
    startCountdown();
  }catch(e){ console.error(e); toast(e.message || 'Failed'); }
}

$('encryptBtn').onclick = doEncrypt;
$('decryptBtn').onclick = doDecrypt;
$('copyBtn').onclick = async ()=>{
  const v = $('cipherOut').value;
  if(!v) return;
  await navigator.clipboard.writeText(v);
  toast('Copied');
};
$('clearBtn').onclick = ()=>{
  ['plainIn','cipherOut','cipherIn','plainOut'].forEach(id=>$(id).value='');
  $('secretName').value='secret';
  $('countdown').style.display='none';
  clearInterval(timer);
  toast('Cleared');
};

$('countdown').style.display='none';
if(!window.isSecureContext) toast('Requires HTTPS');
if(!window.PublicKeyCredential) toast('WebAuthn not supported');
</script>
</body>
</html>
